name: Build MHI Nativo
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: Publicar EXE
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true -o publish_folder

      - name: Gerar Instalador
        shell: powershell
        run: |
          $iss = "[Setup]`nAppName=Manutencao MHI`nAppVersion=1.0`nDefaultDirName={pf}\ManutencaoMHI`nOutputDir=installer`nOutputBaseFilename=InstaladorMHI`n[Files]`nSource: 'publish_folder\ManutencaoMHI.exe'; DestDir: '{app}'`n[Icons]`nName: '{autodesktop}\Manutencao MHI'; Filename: '{app}\ManutencaoMHI.exe'"
          $iss | Out-File -FilePath setup.iss -Encoding utf8
          iscc setup.iss

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-Nativo
          path: installer/InstaladorMHI.exe
